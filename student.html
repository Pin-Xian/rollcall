<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>課堂簽到</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem}
.page{width:100%;max-width:420px}
.header{text-align:center;margin-bottom:1.5rem}
.header-title{font-size:20px;font-weight:700;color:#1a1a1a}
.header-sub{font-size:13px;color:#888;margin-top:4px}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.info-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:6px 0;border-bottom:0.5px solid #f0f0f0}
.info-row:last-child{border-bottom:none}
.info-val{font-weight:600;color:#1a1a1a}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:.9rem}
.field label{font-size:13px;color:#555;font-weight:500}
input[type=text]{height:44px;padding:0 14px;border-radius:10px;border:0.5px solid #d0d0d0;background:#fff;color:#1a1a1a;font-size:15px;font-family:inherit;width:100%}
input:focus{outline:none;border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(0,0,0,.07)}
.btn{width:100%;height:48px;border-radius:12px;border:none;background:#1a1a1a;color:#fff;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn:hover{background:#333}
.btn:active{transform:scale(.98)}
.btn:disabled{background:#ccc;cursor:not-allowed}
.alert{border-radius:10px;padding:12px 14px;font-size:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:1rem;line-height:1.5}
.alert-success{background:#f0fdf4;color:#15803d;border:0.5px solid #86efac}
.alert-danger{background:#fef2f2;color:#b91c1c;border:0.5px solid #fca5a5}
.alert-warn{background:#fffbeb;color:#b45309;border:0.5px solid #fcd34d}
.alert-info{background:#eff6ff;color:#1d4ed8;border:0.5px solid #bfdbfe}
.steps{display:flex;align-items:center;margin-bottom:1.5rem}
.step-item{flex:1;text-align:center;font-size:11px;color:#bbb}
.step-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid #e0e0e0;background:#fafafa;display:flex;align-items:center;justify-content:center;margin:0 auto 5px;font-size:12px;font-weight:600}
.step-item.active .step-dot{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.step-item.done .step-dot{background:#f0fdf4;color:#15803d;border-color:#86efac}
.step-item.active{color:#1a1a1a;font-weight:600}
.step-line{flex:1;height:1px;background:#e0e0e0;margin-bottom:20px}
.center{text-align:center}
.big-icon{font-size:56px;margin-bottom:14px;display:block}
.result-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-sub{font-size:14px;color:#666;margin-bottom:1.25rem;line-height:1.6}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
.expired-overlay{text-align:center;padding:2rem 1rem}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-title">📋 課堂簽到</div>
    <div class="header-sub" id="header-sub">載入中...</div>
  </div>

  <!-- 步驟條 -->
  <div class="steps">
    <div class="step-item active" id="step1"><div class="step-dot">1</div>位置</div>
    <div class="step-line"></div>
    <div class="step-item" id="step2"><div class="step-dot">2</div>姓名</div>
    <div class="step-line"></div>
    <div class="step-item" id="step3"><div class="step-dot">3</div>完成</div>
  </div>

  <!-- 步驟1：GPS -->
  <div id="view-gps">
    <div class="card">
      <div class="card-title">課程資訊</div>
      <div class="info-row"><span style="color:#888">課程</span><span class="info-val" id="c-course">—</span></div>
      <div class="info-row"><span style="color:#888">日期</span><span class="info-val" id="c-date">—</span></div>
      <div class="info-row"><span style="color:#888">上課時間</span><span class="info-val" id="c-time">—</span></div>
      <div class="info-row"><span style="color:#888">簽到截止</span><span class="info-val" id="c-deadline">—</span></div>
    </div>
    <div class="alert alert-info" id="gps-hint">
      📍 系統需要確認你在教室內才能簽到。請點下方按鈕並在提示出現時選擇「允許」。
    </div>
    <button class="btn" id="gps-btn" onclick="startGPS()">📍 驗證我的位置</button>
  </div>

  <!-- 步驟2：姓名 -->
  <div id="view-name" style="display:none">
    <div class="alert alert-success" id="gps-ok-msg">✅ 位置驗證通過</div>
    <div class="card">
      <div class="card-title">輸入姓名</div>
      <div class="field">
        <label>你的姓名（請與名冊相符）</label>
        <input type="text" id="stu-name" placeholder="例：王小明" autocomplete="name"/>
      </div>
      <button class="btn" onclick="submitName()">✔ 確認簽到</button>
    </div>
  </div>

  <!-- 步驟3：完成 -->
  <div id="view-done" style="display:none" class="center">
    <span class="big-icon" id="done-icon">✅</span>
    <div class="result-title" id="done-title">簽到成功！</div>
    <div class="result-sub" id="done-sub"></div>
    <div class="card" style="text-align:left">
      <div class="info-row"><span style="color:#888">姓名</span><span class="info-val" id="done-name">—</span></div>
      <div class="info-row"><span style="color:#888">座位</span><span class="info-val" id="done-seat">—</span></div>
      <div class="info-row"><span style="color:#888">簽到時間</span><span class="info-val" id="done-time">—</span></div>
      <div class="info-row"><span style="color:#888">GPS 距離</span><span class="info-val" id="done-dist">—</span></div>
      <div class="info-row"><span style="color:#888">出席狀態</span><span class="info-val" id="done-status">—</span></div>
    </div>
    <div id="done-late" class="alert alert-warn" style="display:none;text-align:left;margin-top:.75rem">⚠️ 已超過截止時間，本次記錄為遲到</div>
  </div>

  <!-- 錯誤畫面 -->
  <div id="view-error" style="display:none" class="center">
    <span class="big-icon">🚫</span>
    <div class="result-title" id="err-title">無法完成簽到</div>
    <div class="alert alert-danger" id="err-msg" style="text-align:left;margin-bottom:1rem"></div>
    <div style="font-size:13px;color:#666;line-height:1.7">
      若確實在教室內但仍無法通過，可能是室內 GPS 訊號較弱，請向老師說明，由老師手動補登。
    </div>
  </div>

  <!-- 無效 QR -->
  <div id="view-invalid" style="display:none" class="center">
    <span class="big-icon">❓</span>
    <div class="result-title">無效的簽到連結</div>
    <div style="font-size:14px;color:#666;line-height:1.7;margin-top:.5rem">請掃描老師今日產生的 QR Code</div>
  </div>
</div>

<script>
// 從 URL 取得參數
const params = new URLSearchParams(location.search);
const course    = params.get('course') || '';
const dateStr   = params.get('date') || '';
const classTime = params.get('classTime') || '';
const deadline  = params.get('deadline') || '';
const lat       = parseFloat(params.get('lat') || '0');
const lng       = parseFloat(params.get('lng') || '0');
const radius    = parseInt(params.get('radius') || '80');
const token     = params.get('token') || '';   // 每次產生 QR 的唯一 token

// 驗證參數
if(!course || !deadline || !lat || !lng || !token){
  show('view-invalid');
} else {
  document.getElementById('header-sub').textContent = course + '　' + dateStr;
  document.getElementById('c-course').textContent = course;
  document.getElementById('c-date').textContent = dateStr;
  document.getElementById('c-time').textContent = classTime;
  document.getElementById('c-deadline').textContent = deadline + '（超過視為遲到）';
}

function show(id){
  ['view-gps','view-name','view-done','view-error','view-invalid'].forEach(v=>
    document.getElementById(v).style.display = v===id?'block':'none');
}

function setStep(n){
  for(let i=1;i<=3;i++){
    const el=document.getElementById('step'+i);
    el.className='step-item'+(i<n?' done':i===n?' active':'');
  }
}

function haversine(a,b,c,d){
  const R=6371000,rad=x=>x*Math.PI/180;
  const s=Math.sin(rad(c-a)/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(rad(d-b)/2)**2;
  return Math.round(R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s)));
}

let gpsOK = false, gpsDist = 0;

function startGPS(){
  const btn=document.getElementById('gps-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spin">↻</span> 取得位置中...';
  document.getElementById('gps-hint').className='alert alert-info';
  document.getElementById('gps-hint').textContent='📍 正在取得你的位置，請稍候...';

  if(!navigator.geolocation){
    gpsBlocked('此裝置不支援 GPS 定位');return;
  }
  navigator.geolocation.getCurrentPosition(pos=>{
    const dist=haversine(pos.coords.latitude,pos.coords.longitude,lat,lng);
    gpsDist=dist;
    if(dist<=radius){
      gpsOK=true;
      document.getElementById('gps-ok-msg').textContent=`✅ 位置驗證通過（距教室 ${dist} 公尺）`;
      show('view-name');setStep(2);
      setTimeout(()=>document.getElementById('stu-name').focus(),200);
    } else {
      gpsBlocked(`你目前距離教室約 ${dist} 公尺，超過允許的 ${radius} 公尺範圍。`);
    }
  }, err=>{
    gpsBlocked(err.code===1?'你拒絕了位置存取授權，無法完成 GPS 驗證。':'無法取得位置，請確認手機 GPS 已開啟。');
  },{timeout:15000,enableHighAccuracy:true});
}

function gpsBlocked(reason){
  document.getElementById('err-title').textContent='位置驗證失敗';
  document.getElementById('err-msg').innerHTML=reason;
  show('view-error');
}

function submitName(){
  const name=document.getElementById('stu-name').value.trim();
  if(!name){alert('請輸入姓名');return;}

  // 讀取座位表（從 localStorage，key 與 teacher.html 相同）
  let seats={};
  try{ seats=JSON.parse(localStorage.getItem('attendance_seats_v1')||'{}'); }catch(e){}

  const seat=Object.entries(seats).find(([s,n])=>n===name)?.[0];
  if(!seat){
    document.getElementById('err-title').textContent='找不到此學生';
    document.getElementById('err-msg').innerHTML=`「${name}」不在座位名冊中，請確認姓名是否正確，或請老師手動補登。`;
    show('view-error');return;
  }

  // 防重複：用 token+seat 記錄是否已簽到
  const doneKey=`done_${token}_${seat}`;
  if(localStorage.getItem(doneKey)){
    document.getElementById('err-title').textContent='已完成簽到';
    document.getElementById('err-msg').innerHTML='你已完成今日簽到，請勿重複送出。';
    show('view-error');return;
  }

  const now=new Date();
  const timeStr=now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const nowMin=now.getHours()*60+now.getMinutes();
  const[dh,dm]=deadline.split(':').map(Number);
  const isLate=nowMin>dh*60+dm;

  // 寫入簽到紀錄（供老師端讀取）
  const record={name,seat,timeStr,ts:now.getTime(),late:isLate,dist:gpsDist};
  const recKey=`record_${token}`;
  let allRecords={};
  try{ allRecords=JSON.parse(localStorage.getItem(recKey)||'{}'); }catch(e){}
  allRecords[seat]=record;
  localStorage.setItem(recKey, JSON.stringify(allRecords));
  localStorage.setItem(doneKey,'1');

  // 顯示完成
  document.getElementById('done-name').textContent=name;
  document.getElementById('done-seat').textContent=seat;
  document.getElementById('done-time').textContent=timeStr;
  document.getElementById('done-dist').textContent=gpsDist+' 公尺';
  document.getElementById('done-status').innerHTML=isLate
    ?'<span style="color:#b91c1c;font-weight:600">遲到</span>'
    :'<span style="color:#15803d;font-weight:600">準時到課</span>';
  document.getElementById('done-icon').textContent=isLate?'⏰':'✅';
  document.getElementById('done-title').textContent=isLate?'已簽到（遲到）':'簽到成功！';
  document.getElementById('done-sub').textContent=isLate
    ?'你的出席已記錄，但超過截止時間。':'你的出席已成功記錄！';
  document.getElementById('done-late').style.display=isLate?'flex':'none';
  show('view-done');setStep(3);
}
</script>
</body>
</html>
