<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>課堂簽到</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#F4F4F1;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.page{width:100%;max-width:440px}
.hdr{text-align:center;margin-bottom:2rem;padding-top:.5rem}
.hdr-badge{display:inline-block;background:#D8EDDF;color:#2D6A4F;border-radius:100px;font-size:11px;font-weight:700;padding:4px 12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.75rem}
.hdr-title{font-size:26px;font-weight:700;color:#18181A;letter-spacing:-.02em;margin-bottom:4px}
.hdr-sub{font-size:14px;color:#62626A}
.card{background:#fff;border:1px solid #E4E4DF;border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:11px;font-weight:700;color:#62626A;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.9rem}
.ip{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:7px 0;border-bottom:1px solid #F0F0EC}
.ip:last-child{border-bottom:none}
.ip-k{color:#62626A}
.ip-v{font-weight:700;color:#18181A}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:.9rem}
.field label{font-size:13px;color:#62626A;font-weight:600}
input[type=text]{height:52px;padding:0 16px;border-radius:10px;border:1.5px solid #CACAC4;background:#fff;color:#18181A;font-size:17px;font-family:inherit;width:100%;transition:.15s}
input[type=text]:focus{outline:none;border-color:#2D6A4F;box-shadow:0 0 0 3px rgba(45,106,79,.12)}
.btn{width:100%;height:54px;border-radius:12px;border:none;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;letter-spacing:-.01em}
.btn-primary{background:#18181A;color:#fff}.btn-primary:hover{background:#333}.btn-primary:active{transform:scale(.98)}
.btn-outline{background:#fff;color:#18181A;border:1.5px solid #CACAC4;height:46px;font-size:14px;font-weight:600;border-radius:10px}.btn-outline:hover{background:#F4F4F1}
.alert{border-radius:10px;padding:12px 16px;font-size:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:1rem;line-height:1.6;font-weight:500}
.a-ok{background:#D8EDDF;color:#2D6A4F;border:1px solid #A7D7B9}
.a-err{background:#FFE8EA;color:#C1121F;border:1px solid #F5B8BD}
.a-warn{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.center{text-align:center}
.big-icon{font-size:64px;display:block;margin:0 auto 1rem}
.res-title{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
.res-sub{font-size:14px;color:#62626A;line-height:1.6;margin-bottom:1.5rem}
.deadline-bar{background:#18181A;color:#fff;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.deadline-bar span{font-size:16px;font-weight:700;color:#52B788}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
.divider{height:1px;background:#E4E4DF;margin:.75rem 0}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-badge">📋 課堂簽到</div>
    <div class="hdr-title" id="hdr-course">載入中...</div>
    <div class="hdr-sub" id="hdr-date"></div>
  </div>

  <!-- 簽到表單 -->
  <div id="view-form">
    <div class="deadline-bar">
      <span>截止時間</span>
      <span id="bar-deadline">—</span>
    </div>
    <div class="card">
      <div class="card-title">課程資訊</div>
      <div class="ip"><span class="ip-k">班級</span><span class="ip-v" id="c-cls">—</span></div>
      <div class="ip"><span class="ip-k">上課時間</span><span class="ip-v" id="c-time">—</span></div>
      <div class="ip"><span class="ip-k">遲到截止</span><span class="ip-v" id="c-deadline">—</span></div>
    </div>
    <div class="card">
      <div class="card-title">輸入姓名簽到</div>
      <div class="field">
        <label>你的姓名（請與名冊相符）</label>
        <input type="text" id="stu-name" placeholder="例：王小明" autocomplete="name" autocorrect="off" autocapitalize="off"/>
      </div>
      <button class="btn btn-primary" onclick="submitName()">✔ 確認簽到</button>
    </div>
  </div>

  <!-- 送出中 -->
  <div id="view-loading" style="display:none" class="center">
    <div style="font-size:52px;margin-bottom:1rem"><span class="spin">↻</span></div>
    <div style="font-size:17px;font-weight:600;color:#18181A;margin-bottom:6px">送出中...</div>
    <div style="font-size:14px;color:#62626A">請稍候</div>
  </div>

  <!-- 完成 -->
  <div id="view-done" style="display:none" class="center">
    <span class="big-icon" id="done-icon">✅</span>
    <div class="res-title" id="done-title">簽到成功！</div>
    <div class="res-sub" id="done-sub"></div>
    <div class="card" style="text-align:left">
      <div class="ip"><span class="ip-k">姓名</span><span class="ip-v" id="done-name">—</span></div>
      <div class="ip"><span class="ip-k">座位</span><span class="ip-v" id="done-seat">—</span></div>
      <div class="ip"><span class="ip-k">座號</span><span class="ip-v" id="done-sno">—</span></div>
      <div class="ip"><span class="ip-k">簽到時間</span><span class="ip-v" id="done-time">—</span></div>
      <div class="ip"><span class="ip-k">出席狀態</span><span class="ip-v" id="done-status">—</span></div>
    </div>
    <div id="done-late" class="alert a-warn" style="display:none;text-align:left;margin-top:.75rem">
      ⚠️ 已超過截止時間，本次記錄為遲到
    </div>
  </div>

  <!-- 錯誤 -->
  <div id="view-error" style="display:none" class="center">
    <span class="big-icon">😔</span>
    <div class="res-title" id="err-title">無法完成簽到</div>
    <div class="alert a-err" id="err-msg" style="text-align:left;margin-bottom:1.25rem"></div>
    <button class="btn btn-outline" onclick="location.reload()">← 重新嘗試</button>
  </div>

  <!-- 無效連結 -->
  <div id="view-invalid" style="display:none" class="center">
    <span class="big-icon">❓</span>
    <div class="res-title">無效的連結</div>
    <div style="font-size:14px;color:#62626A;margin-top:.5rem;line-height:1.7">請用手機掃描老師今日產生的 QR Code</div>
  </div>
</div>

<script>
const p        = new URLSearchParams(location.search);
const course   = p.get('c')   || '';
const dateStr  = p.get('d')   || '';
const clsTime  = p.get('t')   || '';
const deadline = p.get('dl')  || '';
const cls      = p.get('cls') || '';
const token    = p.get('tk')  || '';
const apiUrl   = p.get('api') || '';

function show(id){
  ['view-form','view-loading','view-done','view-error','view-invalid'].forEach(v=>
    document.getElementById(v).style.display=(v===id)?'block':'none');
}

if(!course||!deadline||!token){
  show('view-invalid');
} else {
  document.getElementById('hdr-course').textContent   = course;
  document.getElementById('hdr-date').textContent     = dateStr + (cls?' · '+cls:'');
  document.getElementById('bar-deadline').textContent = deadline;
  document.getElementById('c-cls').textContent        = cls||'—';
  document.getElementById('c-time').textContent       = clsTime||'—';
  document.getElementById('c-deadline').textContent   = deadline+'（超過視為遲到）';
  setTimeout(()=>document.getElementById('stu-name').focus(), 300);
}

async function submitName(){
  const name = document.getElementById('stu-name').value.trim();
  if(!name){alert('請輸入姓名');return;}

  show('view-loading');

  // 判斷遲到
  const now     = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const nowMin  = now.getHours()*60+now.getMinutes();
  const [dh,dm] = deadline.split(':').map(Number);
  const isLate  = nowMin > dh*60+dm;

  // 嘗試送到 Apps Script
  let seat='—', sno='—', sid='';
  let ok=false, errMsg='';

  if(apiUrl){
    try{
      const res = await fetch(apiUrl, {
        method:'POST',
        body: JSON.stringify({
          action:'checkin',
          course, date:dateStr, cls, name, token,
          deadline, timeStr, isLate: isLate?true:false
        })
      });
      const data = await res.json();
      if(data.ok){
        ok=true;
        seat = data.seat||'—';
        sno  = data.sno||'—';
      } else if(data.duplicate){
        showErr('已完成簽到','你已完成今日簽到，請勿重複送出。');
        return;
      } else {
        errMsg = data.msg||'伺服器錯誤';
      }
    }catch(e){
      errMsg='網路連線失敗，請確認 Wi-Fi 並重試';
    }
  } else {
    // 離線模式：從 localStorage 找座位（僅同裝置可用）
    try{
      const seats=JSON.parse(localStorage.getItem('att_seats_v3')||'{}');
      const clsSeats=seats[cls]||{};
      const entry=Object.entries(clsSeats).find(([,v])=>v.name===name);
      if(entry){
        seat=entry[0]; sno=entry[1].sno; sid=entry[1].sid; ok=true;
      } else {
        errMsg='找不到「'+name+'」，請確認姓名是否正確';
      }
    }catch(e){ errMsg='找不到座位資料'; }
  }

  if(!ok){
    showErr('簽到失敗', errMsg||'請向老師說明');
    return;
  }

  // 顯示成功
  document.getElementById('done-name').textContent   = name;
  document.getElementById('done-seat').textContent   = seat;
  document.getElementById('done-sno').textContent    = sno||'—';
  document.getElementById('done-time').textContent   = timeStr;
  document.getElementById('done-status').innerHTML   = isLate
    ? '<span style="color:#C1121F;font-weight:700">遲到</span>'
    : '<span style="color:#2D6A4F;font-weight:700">準時到課</span>';
  document.getElementById('done-icon').textContent   = isLate?'⏰':'✅';
  document.getElementById('done-title').textContent  = isLate?'已簽到（遲到）':'簽到成功！';
  document.getElementById('done-sub').textContent    = isLate?'出席已記錄，但已超過截止時間。':'你的出席已成功記錄！';
  document.getElementById('done-late').style.display = isLate?'flex':'none';
  show('view-done');
}

function showErr(title, msg){
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent   = msg;
  show('view-error');
}
</script>
</body>
</html>
