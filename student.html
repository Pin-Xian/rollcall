<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>課堂簽到</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#F4F4F1;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.page{width:100%;max-width:420px}
.hdr{text-align:center;margin-bottom:1.75rem;padding-top:.25rem}
.hdr-badge{display:inline-block;background:#D8EDDF;color:#2D6A4F;border-radius:100px;font-size:11px;font-weight:700;padding:4px 14px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.75rem}
.hdr-title{font-size:24px;font-weight:700;color:#18181A;letter-spacing:-.02em;margin-bottom:4px}
.hdr-sub{font-size:14px;color:#62626A;line-height:1.5}
.card{background:#fff;border:1px solid #E4E4DF;border-radius:14px;padding:1.35rem 1.5rem;margin-bottom:.9rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-label{font-size:10px;font-weight:700;color:#A0A0A8;text-transform:uppercase;letter-spacing:.09em;margin-bottom:.75rem}
.ip{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:7px 0;border-bottom:1px solid #F0F0EC}
.ip:last-child{border-bottom:none}
.ip-k{color:#62626A}
.ip-v{font-weight:700;color:#18181A}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:.85rem}
.field label{font-size:13px;color:#62626A;font-weight:600}
input[type=text]{height:52px;padding:0 16px;border-radius:10px;border:1.5px solid #CACAC4;background:#fff;color:#18181A;font-size:17px;font-family:inherit;width:100%;transition:.15s;-webkit-appearance:none}
input[type=text]:focus{outline:none;border-color:#2D6A4F;box-shadow:0 0 0 3px rgba(45,106,79,.15)}
.btn{width:100%;height:54px;border-radius:12px;border:none;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn-primary{background:#18181A;color:#fff}.btn-primary:active{background:#333;transform:scale(.98)}
.btn-outline{background:#fff;color:#18181A;border:1.5px solid #CACAC4;height:46px;font-size:14px;font-weight:600;border-radius:10px}
.btn-outline:active{background:#F4F4F1}
.deadline-banner{background:linear-gradient(135deg,#18181A 0%,#2D3748 100%);border-radius:12px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.deadline-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.04em;text-transform:uppercase}
.deadline-time{font-size:20px;font-weight:700;color:#52B788;letter-spacing:-.01em}
.alert{border-radius:10px;padding:12px 16px;font-size:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:.9rem;line-height:1.6;font-weight:500}
.a-ok  {background:#D8EDDF;color:#2D6A4F;border:1px solid #A7D7B9}
.a-err {background:#FFE8EA;color:#C1121F;border:1px solid #F5B8BD}
.a-warn{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.center{text-align:center}
.big-icon{font-size:64px;display:block;margin:0 auto 1rem;line-height:1}
.res-title{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;color:#18181A}
.res-sub{font-size:14px;color:#62626A;line-height:1.6;margin-bottom:1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-badge">📋 課堂簽到</div>
    <div class="hdr-title" id="hdr-course">載入中...</div>
    <div class="hdr-sub" id="hdr-sub"></div>
  </div>

  <!-- 表單 -->
  <div id="view-form">
    <div class="deadline-banner">
      <div class="deadline-label">簽到截止時間</div>
      <div class="deadline-time" id="bar-dl">—</div>
    </div>
    <div class="card">
      <div class="card-label">課程資訊</div>
      <div class="ip"><span class="ip-k">班級</span><span class="ip-v" id="c-cls">—</span></div>
      <div class="ip"><span class="ip-k">上課時間</span><span class="ip-v" id="c-time">—</span></div>
      <div class="ip"><span class="ip-k">遲到截止</span><span class="ip-v" id="c-dl">—</span></div>
    </div>
    <div class="card">
      <div class="card-label">輸入姓名</div>
      <div class="field">
        <label>你的全名（需與名冊相符）</label>
        <input type="text" id="stu-name" placeholder="例：王小明"
          autocomplete="name" autocorrect="off" autocapitalize="off"
          inputmode="text" enterkeyhint="done"
          onkeydown="if(event.key==='Enter')submitName()"/>
      </div>
      <button class="btn btn-primary" onclick="submitName()">✔ 確認簽到</button>
    </div>
  </div>

  <!-- 送出中 -->
  <div id="view-loading" style="display:none" class="center">
    <div style="font-size:56px;margin-bottom:1rem"><span class="spin">⏳</span></div>
    <div style="font-size:17px;font-weight:700;color:#18181A;margin-bottom:6px">送出中...</div>
    <div style="font-size:14px;color:#62626A">請稍候，勿關閉頁面</div>
  </div>

  <!-- 成功 -->
  <div id="view-done" style="display:none" class="center">
    <span class="big-icon" id="done-icon">✅</span>
    <div class="res-title" id="done-title">簽到成功！</div>
    <div class="res-sub" id="done-sub"></div>
    <div class="card" style="text-align:left">
      <div class="ip"><span class="ip-k">姓名</span><span class="ip-v" id="d-name">—</span></div>
      <div class="ip"><span class="ip-k">座位</span><span class="ip-v" id="d-seat">—</span></div>
      <div class="ip"><span class="ip-k">座號</span><span class="ip-v" id="d-sno">—</span></div>
      <div class="ip"><span class="ip-k">簽到時間</span><span class="ip-v" id="d-time">—</span></div>
      <div class="ip"><span class="ip-k">出席狀態</span><span class="ip-v" id="d-status">—</span></div>
    </div>
    <div id="d-late" class="alert a-warn" style="display:none;text-align:left;margin-top:.75rem">
      ⚠️ 已超過截止時間，本次記錄為遲到
    </div>
  </div>

  <!-- 錯誤 -->
  <div id="view-error" style="display:none" class="center">
    <span class="big-icon">😔</span>
    <div class="res-title" id="e-title">無法完成簽到</div>
    <div class="alert a-err" id="e-msg" style="text-align:left;margin-bottom:1.25rem"></div>
    <button class="btn btn-outline" onclick="location.reload()">← 重新嘗試</button>
  </div>

  <!-- 無效連結 -->
  <div id="view-invalid" style="display:none" class="center">
    <span class="big-icon">❓</span>
    <div class="res-title">無效的連結</div>
    <div style="font-size:14px;color:#62626A;margin-top:.5rem;line-height:1.7">
      請用手機掃描老師今日產生的 QR Code
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// ★ API 網址：和老師端共用 localStorage
//   老師端儲存後這裡自動讀取
// ══════════════════════════════════════
const API_URL = localStorage.getItem('att_api_url') || '';

// 從 URL 讀取 QR 參數（已精簡，不含 api）
const p   = new URLSearchParams(location.search);
const clsTime  = p.get('t')   || '';
const deadline = p.get('dl')  || '';
const cls      = p.get('cls') || '';
const token    = p.get('tk')  || '';

// 課程名稱和日期從老師端 localStorage 讀取（同裝置）或顯示預設
let course = '課堂簽到', dateStr = '';
try {
  const cfg = JSON.parse(localStorage.getItem('att_cfg_v3') || '{}');
  if (cfg.course) course = cfg.course;
  if (cfg.dateStr) dateStr = cfg.dateStr;
} catch(e) {}

// ── 顯示工具 ──
function show(id) {
  ['view-form','view-loading','view-done','view-error','view-invalid']
    .forEach(v => document.getElementById(v).style.display = (v===id)?'block':'none');
}
function showErr(title, msg) {
  document.getElementById('e-title').textContent = title;
  document.getElementById('e-msg').textContent   = msg;
  show('view-error');
}

// ── 初始化頁面 ──
if (!deadline || !token || !cls) {
  show('view-invalid');
} else {
  document.getElementById('hdr-course').textContent = course;
  document.getElementById('hdr-sub').textContent    = (dateStr ? dateStr + '　' : '') + cls;
  document.getElementById('bar-dl').textContent     = deadline;
  document.getElementById('c-cls').textContent      = cls;
  document.getElementById('c-time').textContent     = clsTime || '—';
  document.getElementById('c-dl').textContent       = deadline + '（超過視為遲到）';
  setTimeout(() => {
    try { document.getElementById('stu-name').focus(); } catch(e) {}
  }, 400);
}

// ── 簽到送出 ──
async function submitName() {
  const name = document.getElementById('stu-name').value.trim();
  if (!name) { alert('請輸入姓名'); return; }

  show('view-loading');

  // 計算是否遲到
  const now     = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const nowMin  = now.getHours() * 60 + now.getMinutes();
  const [dh, dm] = deadline.split(':').map(Number);
  const isLate  = nowMin > dh * 60 + dm;

  let seat = '—', sno = '—', ok = false, errMsg = '';

  if (API_URL) {
    // ── 有 API：送到 Google Apps Script ──
    try {
      const resp = await fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type':'text/plain'},
        body: JSON.stringify({
          action:   'checkin',
          course, date: dateStr, cls, name, token,
          deadline, timeStr, isLate
        })
      });
      const data = await resp.json();
      if (data.ok) {
        ok   = true;
        seat = data.seat || '已記錄';
        sno  = data.sno  || '—';
      } else if (data.duplicate) {
        showErr('已完成簽到', '你已完成今日簽到，請勿重複送出。');
        return;
      } else {
        errMsg = data.msg || '伺服器回應異常，請向老師說明';
      }
    } catch(e) {
      errMsg = '網路連線失敗（' + e.message + '），請確認 Wi-Fi 後重試';
    }

  } else {
    // ── 無 API：從 localStorage 找座位（老師與學生同裝置時有效）──
    try {
      const seats   = JSON.parse(localStorage.getItem('att_seats_v3') || '{}');
      const clsSeat = seats[cls] || {};
      const entry   = Object.entries(clsSeat).find(([, v]) => v.name === name);
      if (entry) {
        seat = entry[0];
        sno  = entry[1].sno || '—';
        // 寫入本地紀錄
        const recKey = 'att_attend_' + token + '_' + cls;
        let att = {};
        try { att = JSON.parse(localStorage.getItem(recKey) || '{}'); } catch(e2) {}
        if (att[seat]) {
          showErr('已完成簽到', '你已完成今日簽到，請勿重複送出。');
          return;
        }
        att[seat] = { name, seat, sno, timeStr, ts: Date.now(), late: isLate, status: isLate ? '遲到' : '準時' };
        localStorage.setItem(recKey, JSON.stringify(att));
        ok = true;
      } else {
        errMsg = '找不到「' + name + '」，請確認姓名是否與名冊完全相符';
      }
    } catch(e) {
      errMsg = '讀取座位資料失敗，請向老師說明';
    }
  }

  if (!ok) { showErr('簽到失敗', errMsg); return; }

  // ── 顯示成功 ──
  document.getElementById('d-name').textContent   = name;
  document.getElementById('d-seat').textContent   = seat;
  document.getElementById('d-sno').textContent    = sno;
  document.getElementById('d-time').textContent   = timeStr;
  document.getElementById('d-status').innerHTML   = isLate
    ? '<span style="color:#C1121F;font-weight:700">遲到</span>'
    : '<span style="color:#2D6A4F;font-weight:700">準時到課</span>';
  document.getElementById('done-icon').textContent  = isLate ? '⏰' : '✅';
  document.getElementById('done-title').textContent = isLate ? '已簽到（遲到）' : '簽到成功！';
  document.getElementById('done-sub').textContent   = isLate
    ? '出席已記錄，但已超過截止時間。' : '你的出席已成功記錄！';
  document.getElementById('d-late').style.display  = isLate ? 'flex' : 'none';
  show('view-done');
}
</script>
</body>
</html>
