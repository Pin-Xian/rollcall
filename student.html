<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>課堂簽到</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.page{width:100%;max-width:420px}
.hdr{text-align:center;margin-bottom:1.75rem}
.hdr-title{font-size:22px;font-weight:700;color:#1a1a1a}
.hdr-sub{font-size:13px;color:#888;margin-top:4px}
.card{background:#fff;border:.5px solid #e0e0e0;border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:11px;color:#888;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}
.info-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:6px 0;border-bottom:.5px solid #f0f0f0}
.info-row:last-child{border-bottom:none}
.info-val{font-weight:600;color:#1a1a1a}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:.9rem}
.field label{font-size:13px;color:#555;font-weight:500}
input[type=text]{height:48px;padding:0 14px;border-radius:10px;border:.5px solid #d0d0d0;background:#fff;color:#1a1a1a;font-size:16px;font-family:inherit;width:100%}
input:focus{outline:none;border-color:#1a1a1a;box-shadow:0 0 0 3px rgba(0,0,0,.07)}
.btn{width:100%;height:52px;border-radius:12px;border:none;background:#1a1a1a;color:#fff;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn:hover{background:#333}.btn:active{transform:scale(.98)}
.btn-outline{background:#fff;color:#1a1a1a;border:.5px solid #d0d0d0;height:44px;font-size:14px;border-radius:10px}
.btn-outline:hover{background:#f5f5f3}
.alert{border-radius:10px;padding:12px 14px;font-size:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:1rem;line-height:1.5}
.a-err{background:#fef2f2;color:#b91c1c;border:.5px solid #fca5a5}
.a-warn{background:#fffbeb;color:#b45309;border:.5px solid #fcd34d}
.center{text-align:center}
.big-icon{font-size:60px;margin-bottom:14px;display:block}
.result-title{font-size:22px;font-weight:700;margin-bottom:8px}
.result-sub{font-size:14px;color:#666;margin-bottom:1.25rem;line-height:1.6}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="hdr-title">📋 課堂簽到</div>
    <div class="hdr-sub" id="hdr-sub">載入中...</div>
  </div>

  <!-- 簽到表單 -->
  <div id="view-form">
    <div class="card">
      <div class="card-title">課程資訊</div>
      <div class="info-row"><span style="color:#888">課程</span><span class="info-val" id="c-course">—</span></div>
      <div class="info-row"><span style="color:#888">日期</span><span class="info-val" id="c-date">—</span></div>
      <div class="info-row"><span style="color:#888">上課時間</span><span class="info-val" id="c-time">—</span></div>
      <div class="info-row"><span style="color:#888">簽到截止</span><span class="info-val" id="c-deadline">—</span></div>
    </div>
    <div class="card">
      <div class="card-title">輸入你的姓名</div>
      <div class="field">
        <label>姓名（請與名冊相符）</label>
        <input type="text" id="stu-name" placeholder="例：王小明" autocomplete="name" autocorrect="off"/>
      </div>
      <button class="btn" onclick="submitName()">✔ 確認簽到</button>
    </div>
  </div>

  <!-- 完成 -->
  <div id="view-done" style="display:none" class="center">
    <span class="big-icon" id="done-icon">✅</span>
    <div class="result-title" id="done-title">簽到成功！</div>
    <div class="result-sub" id="done-sub"></div>
    <div class="card" style="text-align:left">
      <div class="info-row"><span style="color:#888">姓名</span><span class="info-val" id="done-name">—</span></div>
      <div class="info-row"><span style="color:#888">座位</span><span class="info-val" id="done-seat">—</span></div>
      <div class="info-row"><span style="color:#888">簽到時間</span><span class="info-val" id="done-time">—</span></div>
      <div class="info-row"><span style="color:#888">出席狀態</span><span class="info-val" id="done-status">—</span></div>
    </div>
    <div id="done-late" class="alert a-warn" style="display:none;text-align:left;margin-top:.75rem">
      ⚠️ 已超過截止時間，本次記錄為遲到
    </div>
  </div>

  <!-- 錯誤 -->
  <div id="view-error" style="display:none" class="center">
    <span class="big-icon">🚫</span>
    <div class="result-title" id="err-title">無法完成簽到</div>
    <div class="alert a-err" id="err-msg" style="text-align:left;margin-bottom:1rem"></div>
    <button class="btn btn-outline" onclick="location.reload()">重新嘗試</button>
  </div>

  <!-- 無效連結 -->
  <div id="view-invalid" style="display:none" class="center">
    <span class="big-icon">❓</span>
    <div class="result-title">無效的簽到連結</div>
    <div style="font-size:14px;color:#666;line-height:1.7;margin-top:.5rem">
      請用手機掃描老師今日產生的 QR Code
    </div>
  </div>
</div>

<script>
const p        = new URLSearchParams(location.search);
const course   = p.get('c')  || p.get('course')    || '';
const dateStr  = p.get('d')  || p.get('date')       || '';
const clsTime  = p.get('t')  || p.get('classTime')  || '';
const deadline = p.get('dl') || p.get('deadline')   || '';
const token    = p.get('tk') || p.get('token')      || '';

function show(id) {
  ['view-form','view-done','view-error','view-invalid'].forEach(v =>
    document.getElementById(v).style.display = (v===id) ? 'block' : 'none');
}

if (!course || !deadline || !token) {
  show('view-invalid');
} else {
  document.getElementById('hdr-sub').textContent     = course + '　' + dateStr;
  document.getElementById('c-course').textContent    = course;
  document.getElementById('c-date').textContent      = dateStr;
  document.getElementById('c-time').textContent      = clsTime;
  document.getElementById('c-deadline').textContent  = deadline + '（超過視為遲到）';
  setTimeout(() => document.getElementById('stu-name').focus(), 300);
}

function submitName() {
  const name = document.getElementById('stu-name').value.trim();
  if (!name) { alert('請輸入姓名'); return; }

  // 讀座位表
  let seats = {};
  try { seats = JSON.parse(localStorage.getItem('attendance_seats_v1') || '{}'); } catch(e) {}

  // 找座位
  const entry = Object.entries(seats).find(([, n]) => n === name);
  if (!entry) {
    document.getElementById('err-title').textContent = '找不到此學生';
    document.getElementById('err-msg').innerHTML = `「${name}」不在座位名冊中，請確認姓名是否正確，或請老師手動補登。`;
    show('view-error');
    return;
  }
  const seat = entry[0];

  // 防重複簽到
  const doneKey = `done_${token}_${seat}`;
  if (localStorage.getItem(doneKey)) {
    document.getElementById('err-title').textContent = '已完成簽到';
    document.getElementById('err-msg').innerHTML = '你已完成今日簽到，請勿重複送出。';
    show('view-error');
    return;
  }

  // 判斷遲到
  const now     = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const nowMin  = now.getHours() * 60 + now.getMinutes();
  const [dh, dm] = deadline.split(':').map(Number);
  const isLate  = nowMin > dh * 60 + dm;

  // 寫入紀錄
  const record = {name, seat, timeStr, ts: now.getTime(), late: isLate};
  const recKey = 'record_' + token;
  let allRec = {};
  try { allRec = JSON.parse(localStorage.getItem(recKey) || '{}'); } catch(e) {}
  allRec[seat] = record;
  localStorage.setItem(recKey, JSON.stringify(allRec));
  localStorage.setItem(doneKey, '1');

  // 顯示結果
  document.getElementById('done-name').textContent  = name;
  document.getElementById('done-seat').textContent  = seat;
  document.getElementById('done-time').textContent  = timeStr;
  document.getElementById('done-status').innerHTML  = isLate
    ? '<span style="color:#b91c1c;font-weight:700">遲到</span>'
    : '<span style="color:#15803d;font-weight:700">準時到課</span>';
  document.getElementById('done-icon').textContent  = isLate ? '⏰' : '✅';
  document.getElementById('done-title').textContent = isLate ? '已簽到（遲到）' : '簽到成功！';
  document.getElementById('done-sub').textContent   = isLate ? '出席已記錄，但已超過截止時間。' : '你的出席已成功記錄！';
  document.getElementById('done-late').style.display = isLate ? 'flex' : 'none';
  show('view-done');
}
</script>
</body>
</html>
