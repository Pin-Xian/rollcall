<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>課堂簽到</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#F5F5F2;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem}
.page{width:100%;max-width:420px}
.hdr{text-align:center;margin-bottom:1.75rem}
.badge{display:inline-block;background:#D6EDE1;color:#2A6049;border-radius:100px;font-size:11px;font-weight:700;padding:4px 14px;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.75rem}
.title{font-size:24px;font-weight:700;color:#18181A;letter-spacing:-.02em;margin-bottom:4px}
.sub{font-size:14px;color:#5F5F65;line-height:1.5}
.card{background:#fff;border:1px solid #E2E2DC;border-radius:13px;padding:1.35rem 1.5rem;margin-bottom:.9rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.clabel{font-size:10px;font-weight:700;color:#9F9FA5;text-transform:uppercase;letter-spacing:.09em;margin-bottom:.85rem}
.ip{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:7px 0;border-bottom:1px solid #F0F0EC}
.ip:last-child{border-bottom:none}
.ik{color:#5F5F65}.iv{font-weight:700;color:#18181A}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:.85rem}
.field label{font-size:13px;color:#5F5F65;font-weight:600}
input[type=text]{height:52px;padding:0 16px;border-radius:10px;border:1.5px solid #C8C8C0;background:#fff;color:#18181A;font-size:17px;font-family:inherit;width:100%;-webkit-appearance:none}
input[type=text]:focus{outline:none;border-color:#2A6049;box-shadow:0 0 0 3px rgba(42,96,73,.12)}
.btn{width:100%;height:54px;border-radius:12px;border:none;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn-p{background:#18181A;color:#fff}.btn-p:active{background:#333;transform:scale(.98)}
.btn-o{background:#fff;color:#18181A;border:1.5px solid #C8C8C0;height:46px;font-size:14px;font-weight:600;border-radius:10px}
.deadline{background:linear-gradient(135deg,#18181A,#2D3748);border-radius:12px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.dl-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.05em;text-transform:uppercase}
.dl-time{font-size:22px;font-weight:700;color:#4DAE80}
.alert{border-radius:10px;padding:12px 16px;font-size:13px;display:flex;align-items:flex-start;gap:10px;margin-bottom:.9rem;line-height:1.6;font-weight:500}
.a-info{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.a-err{background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5}
.a-warn{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.center{text-align:center}
.big-icon{font-size:64px;display:block;margin:0 auto 1rem;line-height:1}
.res-title{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px;color:#18181A}
.res-sub{font-size:14px;color:#5F5F65;line-height:1.6;margin-bottom:1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="badge">📋 課堂簽到</div>
    <div class="title" id="hdr-title">課堂簽到</div>
    <div class="sub" id="hdr-sub"></div>
  </div>

  <!-- 表單 -->
  <div id="view-form">
    <div class="deadline">
      <div class="dl-lbl">簽到截止</div>
      <div class="dl-time" id="dl-time">—</div>
    </div>
    <div class="card">
      <div class="clabel">課程資訊</div>
      <div class="ip"><span class="ik">班級</span><span class="iv" id="c-cls">—</span></div>
      <div class="ip"><span class="ik">上課時間</span><span class="iv" id="c-time">—</span></div>
      <div class="ip"><span class="ik">遲到截止</span><span class="iv" id="c-dl">—</span></div>
    </div>
    <div class="card">
      <div class="clabel">輸入姓名</div>
      <div class="field">
        <label>你的全名（需與名冊完全相符）</label>
        <input type="text" id="stu-name" placeholder="例：王小明"
          autocomplete="name" autocorrect="off" autocapitalize="off"
          inputmode="text" enterkeyhint="done"
          onkeydown="if(event.key==='Enter')doSubmit()"/>
      </div>
      <button class="btn btn-p" onclick="doSubmit()">✔ 確認簽到</button>
    </div>
  </div>

  <!-- 送出中 -->
  <div id="view-submitting" style="display:none" class="center">
    <div style="font-size:52px;margin-bottom:1rem"><span class="spin">⏳</span></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:6px">送出中...</div>
    <div style="font-size:14px;color:#5F5F65">請稍候，勿關閉頁面</div>
  </div>

  <!-- 成功 -->
  <div id="view-done" style="display:none" class="center">
    <span class="big-icon" id="done-icon">✅</span>
    <div class="res-title" id="done-title">簽到成功！</div>
    <div class="res-sub" id="done-sub"></div>
    <div class="card" style="text-align:left">
      <div class="ip"><span class="ik">姓名</span><span class="iv" id="d-name">—</span></div>
      <div class="ip"><span class="ik">座位</span><span class="iv" id="d-seat">—</span></div>
      <div class="ip"><span class="ik">座號</span><span class="iv" id="d-sno">—</span></div>
      <div class="ip"><span class="ik">簽到時間</span><span class="iv" id="d-time">—</span></div>
      <div class="ip"><span class="ik">出席狀態</span><span class="ip" id="d-status">—</span></div>
    </div>
    <div id="d-late" class="alert a-warn" style="display:none;text-align:left;margin-top:.75rem">⚠️ 已超過截止時間，本次記錄為遲到</div>
  </div>

  <!-- 錯誤 -->
  <div id="view-error" style="display:none" class="center">
    <span class="big-icon">😔</span>
    <div class="res-title" id="e-title">無法完成簽到</div>
    <div class="alert a-err" id="e-msg" style="text-align:left;margin-bottom:1.25rem"></div>
    <button class="btn btn-o" onclick="location.reload()">← 重新嘗試</button>
  </div>

  <!-- 無效連結 -->
  <div id="view-invalid" style="display:none" class="center">
    <span class="big-icon">❓</span>
    <div class="res-title">無效的連結</div>
    <div style="font-size:14px;color:#5F5F65;margin-top:.5rem;line-height:1.7">請用手機掃描老師今日產生的 QR Code</div>
  </div>
</div>

<script>
// QR URL 參數
const p        = new URLSearchParams(location.search);
const clsTime  = p.get('t')   || '';
const deadline = p.get('dl')  || '';
const cls      = p.get('cls') || '';
const token    = p.get('tk')  || '';
const apiUrl   = p.get('api') || '';  // Apps Script URL
const course   = p.get('c')   || '';
const dateStr  = p.get('d')   || '';

// 座位表從 localStorage 讀（teacher 和 student 同 origin，可共享）
let SEATS = {};
try {
  const s = JSON.parse(localStorage.getItem('att_se3') || '{}');
  SEATS = s[cls] || {};
} catch(e) {}

function show(id) {
  ['view-form','view-submitting','view-done','view-error','view-invalid']
    .forEach(v => { const e=document.getElementById(v); if(e) e.style.display=(v===id)?'block':'none'; });
}
function showErr(title, msg) {
  document.getElementById('e-title').textContent = title;
  document.getElementById('e-msg').textContent   = msg;
  show('view-error');
}

if (!deadline || !token || !cls) {
  show('view-invalid');
} else {
  document.getElementById('hdr-title').textContent = course || '課堂簽到';
  document.getElementById('hdr-sub').textContent   = (dateStr ? dateStr + '　' : '') + cls;
  document.getElementById('dl-time').textContent   = deadline;
  document.getElementById('c-cls').textContent     = cls;
  document.getElementById('c-time').textContent    = clsTime || '—';
  document.getElementById('c-dl').textContent      = deadline + '（超過視為遲到）';
  setTimeout(() => { try { document.getElementById('stu-name').focus(); } catch(e){} }, 400);
}

async function doSubmit() {
  const name = document.getElementById('stu-name').value.trim();
  if (!name) { alert('請輸入姓名'); return; }

  show('view-submitting');

  const now     = new Date();
  const timeStr = now.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const nowMin  = now.getHours()*60 + now.getMinutes();
  const [dh,dm] = deadline.split(':').map(Number);
  const isLate  = nowMin > dh*60+dm;

  // 在座位表找姓名
  const entry = Object.entries(SEATS).find(([,v]) => v.name === name);
  if (!entry) {
    showErr('找不到此學生', '「'+name+'」不在本班座位表中。請確認姓名是否與名冊完全相符，或請老師手動補登。');
    return;
  }
  const [seat, info] = entry;

  // 防重複
  const doneKey = 'done_'+token+'_'+seat;
  if (localStorage.getItem(doneKey)) {
    showErr('已完成簽到', '你已完成今日簽到，請勿重複送出。');
    return;
  }

  const rec = {
    name, seat, sno: info.sno||'', sid: info.sid||'',
    timeStr, ts: now.getTime(), late: isLate,
    date: now.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}),
    cls, token, course, dateStr
  };

  // 送到 Apps Script
  let ok = false;
  if (apiUrl) {
    try {
      const r = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(rec)
      });
      const d = await r.json();
      if (d.ok) ok = true;
      else if (d.duplicate) {
        showErr('已完成簽到', '你已完成今日簽到，請勿重複送出。');
        localStorage.setItem(doneKey, '1');
        return;
      } else {
        showErr('簽到失敗', d.msg || '伺服器回應錯誤，請稍後再試或請老師手動補登。');
        return;
      }
    } catch(e) {
      showErr('網路錯誤', '無法連接伺服器（'+e.message+'），請確認網路連線後重試。');
      return;
    }
  } else {
    showErr('系統錯誤', '找不到伺服器設定，請請老師確認系統設定是否完成。');
    return;
  }

  localStorage.setItem(doneKey, '1');

  // 顯示成功
  document.getElementById('d-name').textContent   = name;
  document.getElementById('d-seat').textContent   = seat;
  document.getElementById('d-sno').textContent    = info.sno || '—';
  document.getElementById('d-time').textContent   = timeStr;
  document.getElementById('d-status').innerHTML   = isLate
    ? '<span style="color:#B91C1C;font-weight:700">遲到</span>'
    : '<span style="color:#2A6049;font-weight:700">準時到課</span>';
  document.getElementById('done-icon').textContent  = isLate ? '⏰' : '✅';
  document.getElementById('done-title').textContent = isLate ? '已簽到（遲到）' : '簽到成功！';
  document.getElementById('done-sub').textContent   = isLate
    ? '出席已記錄，但已超過截止時間。' : '你的出席已成功記錄！';
  document.getElementById('d-late').style.display  = isLate ? 'flex' : 'none';
  show('view-done');
}
</script>
</body>
</html>
